<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Invest — Variation A: Clean Polish</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-primary: #7101DA;
    --purple-dark: #5B01AF;
    --purple-bg: rgba(113,1,218,0.08);
    --text-primary: #1F2123;
    --text-secondary: #687178;
    --text-subtle: #9EA5AC;
    --surface-primary: #FFFFFF;
    --surface-subtle: #F2F6F9;
    --surface-soft: #E9EDF1;
    --border-subtle: #DFE4E8;
    --border-soft: #E4E7E9;
    --success: #1F7A4F;
    --success-subtle: #DDEDE2;
    --success-ink: #144F34;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #1f2123;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    color: var(--text-primary);
  }
  body.in-frame { padding: 0 !important; background: var(--surface-subtle); }
  body.in-frame .device { height: 100%; border-radius: 0; box-shadow: none; }
  .device {
    width: 390px;
    height: 844px;
    background: var(--surface-subtle);
    border-radius: 40px;
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    scrollbar-width: none;
  }
  .device::-webkit-scrollbar { display: none; }
  .status-bar, .nav { flex-shrink: 0; }
  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    font-size: 15px;
    font-weight: 600;
    background: var(--surface-subtle);
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .nav {
    padding: 12px 16px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface-subtle);
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    background: var(--surface-primary);
    border: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    cursor: pointer;
  }
  .nav-title { font-size: 16px; font-weight: 600; }
  .nav-spacer { width: 40px; }

  .content {
    flex: 1;
    padding: 8px 16px 120px;
  }

  .page-header {
    padding: 4px 4px 20px;
  }
  .page-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.6px;
    color: var(--text-primary);
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  .goal-summary {
    background: var(--surface-primary);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .gs-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-subtle);
  }
  .gs-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 4px;
  }
  .gs-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .amount-card {
    background: var(--surface-primary);
    border-radius: 24px;
    padding: 24px 20px 28px;
    box-shadow: 0 1px 2px rgba(31,33,35,0.04), 0 4px 12px rgba(31,33,35,0.04);
    text-align: center;
  }
  .amount-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-bottom: 16px;
  }
  .amount-input-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
  }
  .amount-currency {
    font-family: 'Inter', sans-serif;
    font-size: 36px;
    font-weight: 500;
    color: var(--text-subtle);
    margin-right: 2px;
  }
  .amount-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    letter-spacing: -1.5px;
    color: var(--text-primary);
    border: none;
    outline: none;
    background: transparent;
    width: 140px;
    padding: 0;
    text-align: left;
  }
  .amount-helper {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 12px;
  }

  .quick-chips {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--surface-subtle);
    border: 1px solid var(--border-subtle);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
  }
  .chip.active {
    background: var(--purple-bg);
    border-color: var(--purple-primary);
    color: var(--purple-primary);
  }

  .info-card {
    background: var(--surface-primary);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 14px 16px;
    margin-top: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .info-card .ic-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--purple-bg);
    color: var(--purple-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .info-card .ic-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.45;
  }
  .info-card .ic-body strong { color: var(--text-primary); font-weight: 600; }

  .cta-dock {
    position: sticky;
    bottom: 0;
    padding: 16px;
    background: linear-gradient(180deg, rgba(242,246,249,0) 0%, var(--surface-subtle) 30%);
  }
  .cta {
    width: 100%;
    padding: 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    background: var(--purple-primary);
    color: #fff;
    border: none;
    cursor: pointer;
  }
  .cta:hover { background: var(--purple-dark); }
  .cta.secondary {
    background: var(--surface-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-subtle);
  }
  .cta.secondary:hover { background: var(--surface-soft); }
  .cta-stack { display: flex; flex-direction: column; gap: 8px; }

  /* Stages */
  .stage { display: none; }
  .stage.active { display: block; }

  /* Review */
  .review-card {
    background: var(--surface-primary);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 1px 2px rgba(31,33,35,0.04), 0 4px 12px rgba(31,33,35,0.04);
  }
  .review-amount {
    text-align: center;
    padding: 8px 0 20px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 16px;
  }
  .review-amount .ra-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-subtle); margin-bottom: 8px;
  }
  .review-amount .ra-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 40px; font-weight: 500; letter-spacing: -1.2px;
    color: var(--text-primary);
  }
  .review-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0;
  }
  .review-row + .review-row { border-top: 1px solid var(--border-soft); }
  .rv-label { font-size: 13px; color: var(--text-secondary); }
  .rv-value { font-size: 14px; font-weight: 500; color: var(--text-primary); }

  /* Success */
  .success-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 24px 20px;
    text-align: center;
  }
  .success-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--purple-bg); color: var(--purple-primary);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .stage.active[data-stage="success"] .success-icon {
    animation: successPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .stage.active[data-stage="success"] .success-icon svg polyline {
    stroke-dasharray: 30;
    stroke-dashoffset: -30;
    animation: drawCheck 0.45s 0.2s cubic-bezier(0.65, 0, 0.35, 1) both;
  }
  @keyframes successPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }
  .success-title {
    font-size: 24px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text-primary); margin-bottom: 8px;
  }
  .success-sub {
    font-size: 14px; color: var(--text-secondary); line-height: 1.45;
    max-width: 280px; margin: 0 auto 24px;
  }
  .success-card {
    background: var(--surface-primary);
    border: 1px solid var(--border-subtle);
    border-radius: 16px; padding: 16px 20px;
    width: 100%;
  }

  .label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    backdrop-filter: blur(10px);
  }
  svg { display: block; }
</style>
</head>
<body>
<div class="device">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 4a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V4zm5-2a1 1 0 011-1h2a1 1 0 011 1v8a1 1 0 01-1 1H7a1 1 0 01-1-1V2zm5-2a1 1 0 011-1h2a1 1 0 011 1v10a1 1 0 01-1 1h-2a1 1 0 01-1-1V0z"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 8.8a1.1 1.1 0 100 2.2 1.1 1.1 0 000-2.2zm0-3a4.5 4.5 0 00-3.3 1.4l1.2 1.2a2.8 2.8 0 014.2 0l1.2-1.2A4.5 4.5 0 008 5.8zm0-3a7.5 7.5 0 00-5.5 2.4l1.2 1.2a5.8 5.8 0 018.6 0l1.2-1.2A7.5 7.5 0 008 2.8z"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor" opacity=".4"/><rect x="2" y="2" width="14" height="7" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="nav">
    <button class="icon-btn" id="backBtn" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="nav-title" id="navTitle">Invest</div>
    <div class="nav-spacer"></div>
  </div>

  <div class="content">
    <!-- STAGE 1: AMOUNT -->
    <div class="stage active" data-stage="amount">
      <div class="goal-summary">
        <div>
          <div class="gs-label">Into goal</div>
          <div class="gs-name" id="goalName">Retirement Fund</div>
        </div>
        <div style="text-align:right">
          <div class="gs-label">Current</div>
          <div class="gs-value" id="goalValue">€168,500</div>
        </div>
      </div>

      <div class="amount-card">
        <div class="amount-label">Investment amount</div>
        <div class="amount-input-wrap">
          <span class="amount-currency" id="currency">€</span>
          <input class="amount-input" id="amount" type="text" inputmode="decimal" value="1,000" />
        </div>
        <div class="amount-helper">(min <span id="minAmt">€100</span>)</div>
        <div class="quick-chips">
          <button class="chip" data-amt="500">+500</button>
          <button class="chip active" data-amt="1000">+1,000</button>
          <button class="chip" data-amt="5000">+5,000</button>
          <button class="chip" data-amt="10000">+10,000</button>
        </div>
      </div>

    </div>

    <!-- STAGE 2: SUCCESS -->
    <div class="stage" data-stage="success">
      <div class="success-wrap">
        <div class="success-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-title">Investment submitted</div>
        <div class="success-sub">Your funds are on their way. We'll notify you once they're allocated.</div>
        <div class="success-card">
          <div class="review-row" style="padding-top:0">
            <span class="rv-label">Amount</span>
            <span class="rv-value" id="successAmount">€1,000</span>
          </div>
          <div class="review-row">
            <span class="rv-label">Goal</span>
            <span class="rv-value" id="successGoal">Retirement Fund</span>
          </div>
          <div class="review-row" style="padding-bottom:0">
            <span class="rv-label">Reference</span>
            <span class="rv-value" id="successRef">INV-000000</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="cta-dock">
    <button class="cta" id="primaryCta">Invest</button>
  </div>
</div>

<script>
if (window.self !== window.top) document.body.classList.add('in-frame');
(function(){
  var GOALS = {
    retirement: { name: 'Retirement Fund', value: '€168,500', portfolio: 'Balanced', currency: '€', min: '€100' },
    education:  { name: 'Education Fund',  value: '€61,200',  portfolio: 'Balanced', currency: '€', min: '€50'  },
    property:   { name: 'Property Purchase', value: '€44,000', portfolio: 'Income & Growth', currency: '€', min: '€250' }
  };
  var id = new URLSearchParams(location.search).get('goal') || 'retirement';
  var g = GOALS[id] || GOALS.retirement;
  document.getElementById('goalName').textContent = g.name;
  document.getElementById('goalValue').textContent = g.value;
  document.getElementById('currency').textContent = g.currency;
  document.getElementById('minAmt').textContent = g.min;

  var amount = document.getElementById('amount');

  // Dynamic width to keep €  tight to number (cross-browser)
  var measureEl = null;
  function sizeAmount() {
    if (!measureEl) {
      measureEl = document.createElement('span');
      measureEl.style.cssText = 'position:absolute;left:-9999px;top:-9999px;white-space:pre;visibility:hidden;';
      var cs = getComputedStyle(amount);
      measureEl.style.font = cs.font;
      measureEl.style.fontFamily = cs.fontFamily;
      measureEl.style.fontSize = cs.fontSize;
      measureEl.style.fontWeight = cs.fontWeight;
      measureEl.style.letterSpacing = cs.letterSpacing;
      document.body.appendChild(measureEl);
    }
    measureEl.textContent = amount.value || '0';
    amount.style.width = Math.max(40, measureEl.offsetWidth + 2) + 'px';
  }
  amount.addEventListener('input', sizeAmount);
  setTimeout(sizeAmount, 0);

  document.querySelectorAll('.chip').forEach(function(c){
    c.addEventListener('click', function(){
      document.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('active'); });
      c.classList.add('active');
      var v = parseInt(c.getAttribute('data-amt'), 10);
      amount.value = v.toLocaleString('en-US');
      sizeAmount();
    });
  });

  // Stage controller (amount → success)
  var current = 'amount';
  var primary = document.getElementById('primaryCta');
  var navTitle = document.getElementById('navTitle');
  var backBtn = document.getElementById('backBtn');

  function setStage(s) {
    current = s;
    document.querySelectorAll('.stage').forEach(function(el){
      el.classList.toggle('active', el.getAttribute('data-stage') === s);
    });
    if (s === 'amount') {
      navTitle.textContent = 'Invest';
      primary.textContent = 'Invest';
      backBtn.style.visibility = 'visible';
    } else {
      navTitle.textContent = 'Confirmation';
      primary.textContent = 'Back to goal';
      backBtn.style.visibility = 'hidden';
    }
  }

  function currentAmount() { return g.currency + (amount.value || ''); }

  primary.addEventListener('click', function(){
    if (current === 'amount') {
      document.getElementById('successAmount').textContent = currentAmount();
      document.getElementById('successGoal').textContent = g.name;
      document.getElementById('successRef').textContent = 'INV-' + String(Math.floor(100000 + Math.random()*899999));
      setStage('success');
    } else {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'back-to-detail', variant: 'v1', goal: id }, '*');
      } else {
        history.back();
      }
    }
  });

  backBtn.addEventListener('click', function(){
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'back-to-detail', variant: 'v1', goal: id }, '*');
    } else {
      history.back();
    }
  });
})();
</script>
</body>
</html>
