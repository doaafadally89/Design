<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Animation — Option B</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #E8EAED; }
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', system-ui, sans-serif;
}
.label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(0,0,0,0.45);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.stage {
  width: 393px;
  height: 856px;
  transform-origin: top center;
}
iframe {
  width: 393px;
  height: 856px;
  border: none;
  background: #1D272B;
  border-radius: 44px;
  display: block;
}
</style>
</head>
<body>
  <div class="label">Option B</div>
  <div class="stage" id="stage">
    <iframe src="option-1-editorial-ink-terminal-v2-option-c.html?frameless"></iframe>
  </div>
<script>
  const stage = document.getElementById('stage');
  const W = 393, H = 856, CHROME = 60; // label + margins
  function apply() {
    const scale = Math.min((window.innerHeight - CHROME) / H, window.innerWidth / W, 1);
    stage.style.transform = 'scale(' + scale + ')';
    stage.style.marginBottom = (-(H * (1 - scale))) + 'px';
  }
  apply();
  window.addEventListener('resize', apply);
</script>
</body>
</html>
